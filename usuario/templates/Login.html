<!DOCTYPE html>
{% load static %}
<html>

<head>
    <title>Inicio de Sesión</title>

    <style>

    body{
        font-family: Arial, Helvetica, sans-serif;
        margin:0;
        background:#f4f4f4;
    }

    /* MENU */

    .contenedor{
        background:white;
        width:400px;
        margin:80px auto;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        text-align:center;
    }

    h2{
        color:#333;
    }

    input{
        width:90%;
        padding:10px;
        margin:10px 0;
        border-radius:5px;
        border:1px solid #ccc;
    }

    button{
        width:95%;
        padding:10px;
        border:none;
        border-radius:5px;
        background-color:#3498db;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background-color:#2980b9;
    }

    </style>

</head>

<body>

    <div class="contenedor">

        <h2>Inicio de Sesión</h2>

        <img src="{% static 'img/LogoSinFondo.png' %}" width="120">

        <p>Bienvenido al sistema</p>

        <form method="GET">
           

            <input type="text" name="usuario" placeholder="Usuario" >
            <input type="password" name="password" placeholder="Contraseña" >

            <button type="submit">Ingresar</button>
             <p></p>
            <a href="/Registro/">
            <button type="button">Registrarse</button>
        </a>
        </form>

    </div>

</body>

</html>
