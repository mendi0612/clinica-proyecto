<!DOCTYPE html>
<html>

<head>
    <title>Modificar Citas</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .contenedor{
            background:white;
            width:500px;
            margin:50px auto;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:95%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <h2>Modificar Cita</h2>

    <form>

        <input type="text" placeholder="Nombre del paciente">

        <input type="text" placeholder="Nueva hora">

        <button type="submit">
            Modificar cita
        </button>

    </form>

</div>

</body>
</html>
