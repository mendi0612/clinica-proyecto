{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendar Cita</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --principal:#2563eb;
            --secundario:#1e293b;
            --acento:#14b8a6;

            --fondo:#f1f5f9;
            --blanco:#ffffff;

            --texto:#334155;
            --gris:#64748b;

            --sombra:0px 10px 25px rgba(0,0,0,0.08);

            --radio:18px;
        }

        body{

            font-family:'Segoe UI', sans-serif;

            background:var(--fondo);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px;
        }

        .contenedor{

            width:100%;
            max-width:800px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:var(--sombra);
        }

        h1{

            text-align:center;

            margin-bottom:35px;

            color:var(--secundario);
        }

        .fila{

            display:flex;

            gap:20px;

            margin-bottom:20px;
        }

        .grupo{

            flex:1;

            display:flex;

            flex-direction:column;
        }

        label{

            margin-bottom:8px;

            font-weight:600;

            color:var(--texto);
        }

        select,
        input,
        textarea{

            padding:14px;

            border-radius:12px;

            border:1px solid #dbe2ea;

            outline:none;

            font-size:15px;
        }

        select:focus,
        input:focus,
        textarea:focus{

            border-color:var(--principal);
        }

        textarea{

            height:120px;

            resize:none;
        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:var(--principal);

            color:white;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            margin-top:20px;

            transition:0.3s;
        }

        button:hover{

            background:#1d4ed8;
        }

        .mensaje{

            margin-top:20px;

            text-align:center;

            font-weight:bold;

            color:green;
        }

        @media(max-width:768px){

            .fila{
                flex-direction:column;
            }
        }

    </style>

</head>

<body>



<div class="contenedor">

    <h1>Agendar Nueva Cita</h1>

    <form method="POST">

        {% csrf_token %}

        <!-- PACIENTE -->

        <div class="grupo" style="margin-bottom:20px;">

              <label>Paciente</label>

                <input 
                    type="text"
                    value="{{ request.session.nombre }} {{ request.session.apellido }}"
                    readonly
                >

        </div>

        <!-- FILA -->

        <div class="fila">

            <!-- ESPECIALIDAD -->

            <div class="grupo">

                <label>Especialidad</label>

                <select id="especialidad" required>

                    <option value="">Seleccione</option>

                    {% for e in especialidades %}

                        <option value="{{ e.id }}">

                            {{ e.nombre }}

                        </option>

                    {% endfor %}

                </select>

            </div>

            <!-- DOCTOR -->

            <div class="grupo">

                <label>Doctor</label>

                <select name="doctor" id="doctor" required>

                    <option value="">Seleccione doctor</option>

                </select>

            </div>

        </div>

        <!-- FILA -->

        <div class="fila">

            <div class="grupo">

                <label>Fecha</label>

                <input type="date" name="fecha" required>

            </div>

            <div class="grupo">

                <label>Hora</label>

                <select name="hora" required>

                    <option value="">Seleccione hora</option>

                    <option value="08:00">08:00 AM</option>
                    <option value="09:00">09:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="14:00">02:00 PM</option>
                    <option value="15:00">03:00 PM</option>
                    <option value="16:00">04:00 PM</option>

                </select>

            </div>

        </div>

        <!-- MOTIVO -->

        <div class="grupo">

            <label>Motivo</label>

            <textarea name="motivo" required></textarea>

        </div>

        <button type="submit">

            Crear Cita

        </button>


    </form>

      <a href="/gestion/"
            class="btn blue">

            volver

        </a>


    {% if mensaje %}

        <div class="mensaje">

            {{ mensaje }}

        </div>

    {% endif %}

</div>

<!-- ================================= -->
<!-- JAVASCRIPT REACTIVO -->
<!-- ================================= -->

<script>

    const especialidad = document.getElementById("especialidad");

    const doctor = document.getElementById("doctor");

    // ARRAY DE DOCTORES

   const doctores = [

    {% for d in doctores %}

    {
        id: "{{ d.id }}",
        nombre: "Dr. {{ d.nombre }}",
        especialidad: "{{ d.especialidad.id }}"
    },

    {% endfor %}

    ];

    // EVENTO CAMBIO ESPECIALIDAD

    especialidad.addEventListener("change", function(){

        doctor.innerHTML = `
            <option value="">
                Seleccione doctor
            </option>
        `;

        const filtrados = doctores.filter(function(d){

            return d.especialidad == especialidad.value;

        });

        filtrados.forEach(function(d){

            doctor.innerHTML += `
                <option value="${d.id}">
                    ${d.nombre}
                </option>
            `;

        });

    });

</script>

</body>

</html>
