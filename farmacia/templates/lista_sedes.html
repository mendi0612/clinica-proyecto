<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sedes</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        h1 {
            color: #27ae60;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 10px;
        }
        .card {
            border: 1px solid #cbd5e0;
            padding: 20px;
            border-radius: 8px;
            background: #fafafa;
            margin-bottom: 20px;
        }
        .card h3 {
            color: #27ae60;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>Sedes de Dispensación</h1>

    {% for sede in sedes %}
    <div class="card">
        <h3>{{ sede.nombre }}</h3>
        <p>Dirección: {{ sede.direccion }}</p>
        <p>Teléfono: {{ sede.telefono }}</p>
        <p>Horario: {{ sede.horario }}</p>
    </div>
    {% endfor %}

</body>
</html>
