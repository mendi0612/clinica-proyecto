<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Facturas</title>

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* ================= VARIABLES ================= */

:root{

    --color-principal:#2563eb;
    --color-secundario:#1e293b;
    --color-acento:#14b8a6;

    --color-fondo:#f1f5f9;
    --color-blanco:#ffffff;

    --color-texto:#334155;
    --color-gris:#64748b;

    --sombra:0px 10px 25px rgba(0,0,0,0.08);

    --radio:18px;

    --transicion:0.3s ease;
}


/* ================= BODY ================= */

body{

    font-family:'Segoe UI';

    background:var(--color-fondo);

    color:var(--color-texto);

    padding:40px;
}


/* ================= CONTENEDOR ================= */

.contenedor{

    width:90%;

    margin:auto;
}


/* ================= HEADER ================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:40px;
}


.header h1{

    font-size:40px;

    color:var(--color-secundario);
}


/* ================= BOTON ================= */

.btn-volver{

    background:var(--color-principal);

    color:white;

    padding:14px 25px;

    border-radius:12px;

    text-decoration:none;

    font-weight:bold;

    transition:var(--transicion);
}

.btn-volver:hover{

    background:#1d4ed8;
}


/* ================= TABLA ================= */

.tabla{

    width:100%;

    border-collapse:collapse;

    background:white;

    border-radius:20px;

    overflow:hidden;

    box-shadow:var(--sombra);
}


.tabla th{

    background:var(--color-principal);

    color:white;

    padding:18px;

    font-size:18px;
}


.tabla td{

    padding:18px;

    border-bottom:1px solid #e2e8f0;

    text-align:center;
}


.tabla tr:hover{

    background:#f8fafc;
}


/* ================= BOTON DETALLE ================= */

.btn-detalle{

    background:var(--color-acento);

    color:white;

    padding:10px 18px;

    border-radius:10px;

    text-decoration:none;

    font-weight:bold;

    transition:var(--transicion);
}

.btn-detalle:hover{

    opacity:0.9;
}

</style>

</head>

<body>

<div class="contenedor">

    <div class="header">

        <h1>

            🧾 Facturas Generadas

        </h1>

        <a href="/farmacia/" class="btn-volver">

            ⬅ Volver

        </a>

    </div>

    <table class="tabla">

        <thead>

            <tr>

                <th>Número</th>

                <th>Fecha</th>

                <th>Total</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody>

            {% for factura in facturas %}

            <tr>

                <td>

                    {{ factura.numero_factura }}

                </td>

                <td>

                    {{ factura.fecha }}

                </td>

                <td>

                    $ {{ factura.total }}

                </td>

                <td>

                    <a
                        href="/factura/{{ factura.id }}/"
                        class="btn-detalle"
                    >

                        Ver detalles

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
